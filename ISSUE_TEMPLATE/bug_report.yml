name: Bug Report
description: Report a bug or issue with a module
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below.

  - type: input
    id: module
    attributes:
      label: Module
      description: Which module is affected?
      placeholder: e.g., terraform-hcloud-server
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: Module Version
      description: What version of the module are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true

  - type: dropdown
    id: tool
    attributes:
      label: IaC Tool
      description: Which tool are you using?
      options:
        - Terraform
        - OpenTofu
        - Terragrunt
    validations:
      required: true

  - type: input
    id: tool-version
    attributes:
      label: Tool Version
      description: What version of Terraform/OpenTofu/Terragrunt?
      placeholder: e.g., 1.7.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Minimal Terraform configuration to reproduce
      render: hcl
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output
      description: Any error messages or logs
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
