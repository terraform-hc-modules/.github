name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the information below.

  - type: input
    id: module
    attributes:
      label: Module
      description: Which module is this for? (or "new module" for a new module request)
      placeholder: e.g., terraform-hcloud-server
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions have you considered?

  - type: textarea
    id: config
    attributes:
      label: Example Configuration
      description: How would the feature be used?
      render: hcl

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
